<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --text: #e4e4e4;
      --text-dim: #a8a8b3;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --border: #2a2a4a;
      --success: #2ecc71;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    header {
      background-color: var(--surface);
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
    }

    .tab-nav {
      display: flex;
      background-color: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .tab-nav button {
      background: var(--surface);
      color: var(--text-dim);
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s, background-color 0.2s;
    }

    .tab-nav button:hover {
      color: var(--text);
      background-color: var(--surface2);
    }

    .tab-nav button[aria-selected="true"] {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background-color: var(--surface2);
    }

    .tab-panel {
      display: none;
      padding: 2rem;
      max-width: 72rem;
      margin: 0 auto;
    }

    .tab-panel.active {
      display: block;
    }

    .tab-panel h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .tab-panel p {
      color: var(--text-dim);
    }

    .card {
      background-color: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .chart-container {
      position: relative;
      width: 100%;
      max-width: 40rem;
      margin: 1rem auto;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dashboard</h1>
  </header>

  <nav class="tab-nav" role="tablist" aria-label="Main navigation">
    <button role="tab" data-action="switch-tab" aria-selected="true" aria-controls="panel-dashboard" id="tab-dashboard" data-tab="dashboard" tabindex="0" data-testid="dashboard-tab-dashboard">Dashboard</button>
    <button role="tab" data-action="switch-tab" aria-selected="false" aria-controls="panel-tasks" id="tab-tasks" data-tab="tasks" tabindex="-1" data-testid="dashboard-tab-tasks">Tasks</button>
    <button role="tab" data-action="switch-tab" aria-selected="false" aria-controls="panel-metrics" id="tab-metrics" data-tab="metrics" tabindex="-1" data-testid="dashboard-tab-metrics">Metrics</button>
    <button role="tab" data-action="switch-tab" aria-selected="false" aria-controls="panel-settings" id="tab-settings" data-tab="settings" tabindex="-1" data-testid="dashboard-tab-settings">Settings</button>
  </nav>

  <main>
    <section class="tab-panel active" role="tabpanel" id="panel-dashboard" aria-labelledby="tab-dashboard">
      <h2>Overview</h2>
      <div class="card">
        <p>Welcome to the agent dashboard. Monitor tasks, metrics, and configuration from here.</p>
      </div>
    </section>

    <section class="tab-panel" role="tabpanel" id="panel-tasks" aria-labelledby="tab-tasks" hidden>
      <h2>Tasks</h2>
      <div class="card">
        <p>View and manage agent tasks.</p>
      </div>
    </section>

    <section class="tab-panel" role="tabpanel" id="panel-metrics" aria-labelledby="tab-metrics" hidden>
      <h2>Metrics</h2>
      <div class="card">
        <div class="chart-container">
          <canvas id="metrics-chart"></canvas>
        </div>
      </div>
    </section>

    <section class="tab-panel" role="tabpanel" id="panel-settings" aria-labelledby="tab-settings" hidden>
      <h2>Settings</h2>
      <div class="card">
        <p>Configure dashboard preferences.</p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var tabNav = document.querySelector('.tab-nav');
      var tabs = tabNav.querySelectorAll('[role="tab"]');
      var panels = document.querySelectorAll('.tab-panel');

      function activateTab(target) {
        tabs.forEach(function (tab) {
          var selected = tab.dataset.tab === target;
          tab.setAttribute('aria-selected', String(selected));
          tab.setAttribute('tabindex', selected ? '0' : '-1');
        });
        panels.forEach(function (panel) {
          var id = panel.id.replace('panel-', '');
          if (id === target) {
            panel.classList.add('active');
            panel.removeAttribute('hidden');
          } else {
            panel.classList.remove('active');
            panel.setAttribute('hidden', '');
          }
        });
      }

      tabNav.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-action="switch-tab"]');
        if (!btn) return;
        activateTab(btn.dataset.tab);
      });

      tabNav.addEventListener('keydown', function (e) {
        var currentTab = e.target.closest('[role="tab"]');
        if (!currentTab) return;
        var tabArr = Array.from(tabs);
        var index = tabArr.indexOf(currentTab);
        var next = -1;
        if (e.key === 'ArrowRight') next = (index + 1) % tabArr.length;
        else if (e.key === 'ArrowLeft') next = (index - 1 + tabArr.length) % tabArr.length;
        else if (e.key === 'Home') next = 0;
        else if (e.key === 'End') next = tabArr.length - 1;
        if (next >= 0) {
          e.preventDefault();
          tabArr[next].focus();
          activateTab(tabArr[next].dataset.tab);
        }
      });
    })();
  </script>
</body>
</html>
